<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sl1wed.Lua</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* 🔥 ANIMOWANE TŁO */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #6a00ff, #000);
    animation: moveBg 10s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-25%, -25%); }
    100% { transform: translate(0,0); }
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
}

.navbar button {
    background: none;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* SEKCJE */
.section {
    display: none;
    text-align: center;
    margin-top: 150px;
}

.active {
    display: block;
}

/* MAIN */
.title {
    font-size: 50px;
    font-weight: bold;
}

.subtitle {
    margin-top: 10px;
    color: #ccc;
}

/* PRODUCT BOX */
.box {
    margin: 40px auto;
    padding: 25px;
    width: 300px;
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
}

.button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #8a2be2;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* PAYMENT */
.payments {
    display: none;
    margin-top: 10px;
}

.payments button {
    margin: 5px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <button onclick="showTab('main')">Main</button>
    <button onclick="showTab('products')">Products</button>
</div>

<!-- MAIN -->
<div id="main" class="section active">
    <div class="title">Sl1wed.Lua</div>
    <div class="subtitle">Boost Your HVH Experience.</div>
</div>

<!-- PRODUCTS -->
<div id="products" class="section">
    <div class="box">
        <h2>Sl1wedLua</h2>
        <p>$5.99</p>

        <button class="button" onclick="showPayments()">Buy</button>

        <div class="payments" id="payments">
            <button>Card</button>
            <button>PayPal</button>
            <button>CashApp</button>
            <button>Robux</button>
        </div>
    </div>
</div>

<script>
function showTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}

function showPayments() {
    document.getElementById("payments").style.display = "block";
}
</script>

</body>
</html>
