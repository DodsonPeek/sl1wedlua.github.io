<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sl1wed.Lua</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: white;
    text-align: center;
}

.container {
    margin-top: 120px;
}

.title {
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 2px;
}

.subtitle {
    color: #aaa;
    margin-top: 10px;
}

.box {
    margin: 40px auto;
    padding: 25px;
    width: 300px;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(255,255,255,0.05);
}

.button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: white;
    color: black;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.button:hover {
    background: #ddd;
}

.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Sl1wed.Lua</div>
    <div class="subtitle">private script hub</div>

    <div class="box">
        <p>Load the script below</p>

        <button class="button" onclick="copyScript()">COPY LOADSTRING</button>
    </div>
</div>

<div class="footer">
    made by sl1wed
</div>

<script>
function copyScript() {
    navigator.clipboard.writeText(`loadstring(game:HttpGet("TWOJ_LINK_DO_SCRIPTU"))()`);
    alert("Copied!");
}
</script>

</body>
</html>
